name: Auto Release & Publish

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_VERSION=$(jq -r '.version' package.json)
          OLD_VERSION=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' || echo "")
          if [ -n "$OLD_VERSION" ] && [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            if ! gh release view "v${NEW_VERSION}" &>/dev/null; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v5
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install, build, and publish
        if: steps.version.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${RELEASE_VERSION}" --generate-notes
